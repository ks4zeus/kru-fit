# Cloudflare Pages config for kru-fit.
# Static frontend lives in ./frontend; the API runs as a Pages Function
# (frontend/functions/api/[[path]].ts) on the same domain at /api/*.
# Deploy with:  wrangler pages deploy frontend --project-name kru-fit
name = "kru-fit"
compatibility_date = "2024-09-23"
pages_build_output_dir = "frontend"

# D1 binding for the Pages Function (same database as the standalone Worker).
[[d1_databases]]
binding = "DB"
database_name = "kru-fit-db"
database_id = "3863195b-28ac-4423-b67b-45c27d9ee01f"

# Cloudflare Access JWT verification (see worker/src/index.ts). Uncomment and set
# to make /api fail CLOSED. Until then the Function trusts the email header that
# Access injects — which only exists if Access actually fronts this Pages site.
[vars]
ACCESS_TEAM_DOMAIN = "travelkru.cloudflareaccess.com"
ACCESS_AUD = "047314cbdd4b99c556b15785d1feb77e60e73c08ed8f5d944bb1726bb78a5405"
# Admin allowlist (comma-separated). The Access OTP identity for the owner.
ADMIN_EMAILS = "ks4zeus@yahoo.com"

# Secrets (do NOT commit). Set with:
#   wrangler pages secret put ANTHROPIC_API_KEY --project-name kru-fit
#   wrangler pages secret put USDA_API_KEY --project-name kru-fit
# USDA_API_KEY is required for food search (USDA FoodData Central). Get one free at
# https://fdc.nal.usda.gov/api-key-signup.html
